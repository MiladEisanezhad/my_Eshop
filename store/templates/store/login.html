{% extends 'store/base.html' %}
{% load static %}

{% block title %}Login — MiladStore{% endblock %}

{% block content %}
<section class="bg-white py-20 min-h-[60vh] flex items-center">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-8 md:p-12">
            <div class="text-center mb-8">
                <img src="{% static 'images/template-logo.png' %}" alt="TailStore" class="h-14 mx-auto mb-4">
                <h1 class="text-2xl font-bold">Welcome Back</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
            </div>

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                {% if request.GET.next %}<input type="hidden" name="next" value="{{ request.GET.next }}">{% endif %}

                <div class="mb-4">
                    <label for="username" class="block text-sm font-semibold mb-1">Username or Email</label>
                    <input type="text" id="username" name="username" autofocus required
                           class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div class="mb-5">
                    <label for="password" class="block text-sm font-semibold mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary pr-10">
                        <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye text-sm" id="pw-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary border border-primary hover:bg-transparent text-white hover:text-primary font-bold py-2 px-4 rounded-full transition-all">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center space-y-2">
                <p class="text-gray-500 text-sm">
                    Don't have an account? <a href="{% url 'register' %}" class="text-primary font-semibold hover:underline">Register</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
function togglePw() {
    const f = document.getElementById('password');
    const i = document.getElementById('pw-eye');
    f.type = f.type === 'password' ? 'text' : 'password';
    i.classList.toggle('fa-eye'); i.classList.toggle('fa-eye-slash');
}
</script>
{% endblock %}
