{% extends 'store/base.html' %}
{% load static %}

{% block title %}Register — MiladStore{% endblock %}

{% block content %}
<section id="register-login-page" class="bg-white py-16">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row gap-6 max-w-5xl mx-auto">

            <!-- Login Panel -->
            <div class="md:w-1/2 bg-white rounded-xl shadow-md p-8 md:p-10">
                <h2 class="text-2xl font-bold mb-6">Login</h2>
                <form action="{% url 'login' %}" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.GET.next|default:'/' }}">
                    <div class="mb-4">
                        <label for="login-username" class="block text-sm font-semibold mb-1">Username or Email</label>
                        <input type="text" id="login-username" name="username" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div class="mb-4">
                        <label for="login-password" class="block text-sm font-semibold mb-1">Password</label>
                        <div class="relative">
                            <input type="password" id="login-password" name="password" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary pr-10">
                            <button type="button" onclick="togglePassword('login-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between mb-5">
                        <label class="flex items-center gap-2 cursor-pointer text-sm">
                            <input type="checkbox" class="accent-primary"> Remember me
                        </label>
                        <a href="#" class="text-primary hover:underline text-sm">Forgot Password?</a>
                    </div>
                    <button type="submit" class="bg-primary text-white border border-primary hover:bg-transparent hover:text-primary py-2 px-4 rounded-full w-full font-semibold transition-all">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-500 text-sm">Don't have an account?
                        <a href="#register-panel" onclick="document.getElementById('register-panel').scrollIntoView({behavior:'smooth'})" class="text-primary font-semibold hover:underline">Register here</a>
                    </p>
                </div>
            </div>

            <!-- Register Panel -->
            <div class="md:w-1/2 bg-white rounded-xl shadow-md p-8 md:p-10" id="register-panel">
                <h2 class="text-2xl font-bold mb-6">Create Account</h2>
                <form action="{% url 'register' %}" method="post">
                    {% csrf_token %}
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label for="reg-first" class="block text-sm font-semibold mb-1">First Name</label>
                            <input type="text" id="reg-first" name="first_name" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                        <div>
                            <label for="reg-last" class="block text-sm font-semibold mb-1">Last Name</label>
                            <input type="text" id="reg-last" name="last_name" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="reg-email" class="block text-sm font-semibold mb-1">Email <span class="text-primary">*</span></label>
                        <input type="email" id="reg-email" name="email" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div class="mb-4">
                        <label for="reg-username" class="block text-sm font-semibold mb-1">Username <span class="text-primary">*</span></label>
                        <input type="text" id="reg-username" name="username" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div class="mb-4">
                        <label for="reg-password" class="block text-sm font-semibold mb-1">Password <span class="text-primary">*</span></label>
                        <div class="relative">
                            <input type="password" id="reg-password" name="password" required minlength="8"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary pr-10">
                            <button type="button" onclick="togglePassword('reg-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-5">
                        <label for="reg-password2" class="block text-sm font-semibold mb-1">Confirm Password <span class="text-primary">*</span></label>
                        <div class="relative">
                            <input type="password" id="reg-password2" name="password2" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-full focus:border-transparent focus:outline-none focus:ring-2 focus:ring-primary pr-10"
                                   oninput="checkPasswords()">
                            <button type="button" onclick="togglePassword('reg-password2', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <p id="pw-match-msg" class="text-xs mt-1 hidden"></p>
                    </div>
                    <button type="submit" class="bg-primary text-white border border-primary hover:bg-transparent hover:text-primary py-2 px-4 rounded-full w-full font-semibold transition-all">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                </form>
            </div>

        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
function checkPasswords() {
    const p1 = document.getElementById('reg-password').value;
    const p2 = document.getElementById('reg-password2').value;
    const msg = document.getElementById('pw-match-msg');
    if (p2.length === 0) { msg.classList.add('hidden'); return; }
    msg.classList.remove('hidden');
    if (p1 === p2) {
        msg.textContent = '✓ Passwords match';
        msg.className = 'text-xs mt-1 text-green-600';
    } else {
        msg.textContent = '✗ Passwords do not match';
        msg.className = 'text-xs mt-1 text-red-500';
    }
}
</script>
{% endblock %}
